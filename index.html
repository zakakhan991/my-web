<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Prime Properties - Trusted Property Dealer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Source+Sans+3:wght@300;400;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --gold: #c9a84c;
      --gold-light: #e8c76a;
      --dark: #1a1a2e;
      --mid: #4a4a6a;
      --light: #6a6a8a;
      --bg: #f8f5f0;
      --white: #ffffff;
      --border: #e8e0d0;
      --green: #25D366;
    }
    html { scroll-behavior: smooth; }
    body { font-family: 'Source Sans 3', sans-serif; background: var(--bg); color: var(--dark); }

    /* NAV */
    nav { position: fixed; top: 0; width: 100%; z-index: 1000; background: rgba(248,245,240,0.97); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); }
    .nav-inner { max-width: 1200px; margin: 0 auto; padding: 12px 24px; display: flex; justify-content: space-between; align-items: center; }
    .logo { display: flex; align-items: center; gap: 12px; text-decoration: none; }
    .logo img { height: 48px; width: auto; }
    .logo-text { display: flex; flex-direction: column; }
    .logo-main { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 900; color: var(--dark); line-height: 1; }
    .logo-main span { color: var(--gold); }
    .logo-tagline { font-size: 10px; font-weight: 600; color: var(--light); letter-spacing: 2px; text-transform: uppercase; font-family: 'Source Sans 3', sans-serif; margin-top: 2px; }
    .desktop-nav { display: flex; gap: 32px; align-items: center; }
    .nav-link { font-size: 13px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--mid); text-decoration: none; position: relative; transition: color 0.3s; padding-bottom: 4px; }
    .nav-link::after { content: ''; position: absolute; bottom: 0; left: 0; width: 0; height: 2px; background: var(--gold); transition: width 0.3s; }
    .nav-link:hover, .nav-link.active { color: var(--gold); }
    .nav-link:hover::after, .nav-link.active::after { width: 100%; }
    .btn-gold { background: linear-gradient(135deg, var(--gold), var(--gold-light)); color: var(--dark); font-family: 'Source Sans 3', sans-serif; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; font-size: 12px; padding: 10px 22px; border: none; cursor: pointer; border-radius: 2px; transition: all 0.3s; box-shadow: 0 4px 20px rgba(201,168,76,0.3); text-decoration: none; display: inline-flex; align-items: center; gap: 6px; }
    .btn-gold:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(201,168,76,0.5); }
    .btn-outline { background: transparent; color: var(--dark); font-weight: 600; letter-spacing: 1px; text-transform: uppercase; font-size: 13px; padding: 12px 28px; border: 2px solid var(--dark); cursor: pointer; border-radius: 2px; transition: all 0.3s; text-decoration: none; display: inline-flex; align-items: center; gap: 6px; }
    .btn-outline:hover { background: var(--dark); color: var(--bg); }
    .btn-whatsapp { background: var(--green); color: white; font-family: 'Source Sans 3', sans-serif; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; font-size: 12px; padding: 10px 22px; border: none; cursor: pointer; border-radius: 2px; transition: all 0.3s; text-decoration: none; display: inline-flex; align-items: center; gap: 6px; }
    .btn-whatsapp:hover { background: #1da851; transform: translateY(-2px); }
    .hamburger { display: none; background: none; border: none; cursor: pointer; color: var(--dark); font-size: 26px; }
    .mobile-menu { display: none; background: white; border-top: 1px solid var(--border); padding: 16px 24px 24px; flex-direction: column; gap: 4px; }
    .mobile-menu.open { display: flex; }
    .mobile-nav-link { font-size: 15px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--mid); text-decoration: none; padding: 12px 0; border-bottom: 1px solid #f0ebe0; transition: color 0.3s; }
    .mobile-nav-link:hover { color: var(--gold); }

    /* LAYOUT */
    section { padding: 80px 0; }
    .container { max-width: 1200px; margin: 0 auto; padding: 0 24px; }
    .section-label { font-size: 12px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; color: var(--gold); margin-bottom: 16px; }
    .divider { width: 60px; height: 3px; background: linear-gradient(90deg, var(--gold), var(--gold-light)); margin: 16px 0 24px; }
    .divider.center { margin: 16px auto 24px; }
    .section-title { font-family: 'Playfair Display', serif; font-size: 40px; font-weight: 700; color: var(--dark); margin-bottom: 12px; line-height: 1.2; }

    /* HERO */
    #home { padding-top: 90px; padding-bottom: 0; background: var(--dark); position: relative; overflow: hidden; }
    #home::before { content: ''; position: absolute; top: -200px; right: -200px; width: 600px; height: 600px; background: radial-gradient(circle, rgba(201,168,76,0.12), transparent 70%); border-radius: 50%; }
    .hero-grid { display: flex; align-items: flex-end; gap: 48px; }
    .hero-text { flex: 1; padding-bottom: 60px; }
    .hero-badge { display: inline-block; background: rgba(201,168,76,0.15); border: 1px solid rgba(201,168,76,0.4); color: var(--gold); font-size: 12px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; padding: 8px 16px; border-radius: 2px; margin-bottom: 24px; }
    .hero-name { font-family: 'Playfair Display', serif; font-size: 64px; font-weight: 900; line-height: 1.05; color: white; margin-bottom: 16px; }
    .hero-name .gradient { background: linear-gradient(135deg, var(--gold), var(--gold-light)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .hero-tagline { font-size: 18px; font-weight: 400; color: #a0a0c0; margin-bottom: 24px; line-height: 1.7; }
    .hero-desc { color: #8080a0; line-height: 1.8; max-width: 520px; margin-bottom: 36px; font-size: 15px; }
    .hero-btns { display: flex; gap: 16px; flex-wrap: wrap; }
    .hero-img-wrap { flex: 0 0 480px; position: relative; }
    .hero-img { width: 100%; height: 420px; overflow: hidden; border-radius: 8px 8px 0 0; position: relative; }
    .hero-img img { width: 100%; height: 100%; object-fit: cover; }
    .hero-img::after { content: ''; position: absolute; inset: 0; background: linear-gradient(to top, rgba(26,26,46,0.6), transparent 60%); }
    .hero-tag { position: absolute; top: 24px; left: 24px; background: var(--gold); color: var(--dark); font-size: 12px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; padding: 8px 16px; border-radius: 2px; z-index: 2; }

    /* PROPERTY SEARCH BAR */
    .search-bar-section { background: var(--dark); padding: 0 0 60px; position: relative; z-index: 10; }
    .search-bar-container { max-width: 1100px; margin: 0 auto; padding: 0 24px; }
    .search-bar { background: white; border-radius: 8px; padding: 24px 32px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); display: flex; gap: 16px; align-items: flex-end; flex-wrap: wrap; }
    .search-field { flex: 1; min-width: 180px; }
    .search-field label { display: block; font-size: 12px; font-weight: 700; color: var(--mid); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
    .search-field input, .search-field select { width: 100%; padding: 14px 16px; border: 2px solid var(--border); border-radius: 4px; font-family: 'Source Sans 3', sans-serif; font-size: 15px; color: var(--dark); background: white; outline: none; transition: all 0.3s; }
    .search-field input:focus, .search-field select:focus { border-color: var(--gold); box-shadow: 0 0 0 4px rgba(201,168,76,0.15); }
    .search-btn { background: linear-gradient(135deg, var(--gold), var(--gold-light)); color: var(--dark); font-family: 'Source Sans 3', sans-serif; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; font-size: 14px; padding: 16px 32px; border: none; cursor: pointer; border-radius: 4px; transition: all 0.3s; display: flex; align-items: center; gap: 8px; white-space: nowrap; }
    .search-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(201,168,76,0.4); }
    .search-btn svg { width: 18px; height: 18px; }

    /* STATS BAR */
    .stats-bar { background: var(--gold); padding: 28px 0; }
    .stats-bar-inner { max-width: 1200px; margin: 0 auto; padding: 0 24px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 0; }
    .stat-bar-item { text-align: center; border-right: 1px solid rgba(255,255,255,0.3); padding: 0 20px; }
    .stat-bar-item:last-child { border-right: none; }
    .stat-bar-num { font-family: 'Playfair Display', serif; font-size: 36px; font-weight: 900; color: var(--dark); }
    .stat-bar-label { font-size: 13px; font-weight: 600; color: rgba(26,26,46,0.7); margin-top: 4px; text-transform: uppercase; letter-spacing: 1px; }

    /* ABOUT */
    #about { background: white; }
    .about-grid { display: flex; gap: 64px; align-items: center; }
    .about-img { flex: 0 0 460px; height: 400px; border-radius: 4px; overflow: hidden; position: relative; }
    .about-img img { width: 100%; height: 100%; object-fit: cover; }
    .about-img-badge { position: absolute; bottom: 24px; left: 24px; background: var(--dark); color: white; padding: 16px 20px; border-left: 4px solid var(--gold); border-radius: 2px; }
    .about-img-badge strong { display: block; font-family: 'Playfair Display', serif; font-size: 28px; color: var(--gold); }
    .about-img-badge span { font-size: 13px; color: #a0a0c0; }
    .about-content { flex: 1; }
    .about-desc { color: var(--mid); line-height: 1.9; margin-bottom: 16px; font-size: 16px; }
    .about-features { display: flex; flex-direction: column; gap: 12px; margin: 24px 0 32px; }
    .about-feature { display: flex; align-items: center; gap: 12px; font-size: 15px; color: var(--mid); }
    .about-feature::before { content: '✓'; width: 24px; height: 24px; background: var(--gold); color: var(--dark); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; flex-shrink: 0; }

    /* SERVICES */
    #services { background: var(--bg); }
    .services-header { text-align: center; margin-bottom: 56px; }
    .services-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; }
    .service-card { background: white; border: 1px solid var(--border); padding: 36px 28px; border-radius: 4px; transition: all 0.4s; position: relative; overflow: hidden; }
    .service-card::before { content: ''; position: absolute; top: 0; left: 0; width: 4px; height: 0; background: var(--gold); transition: height 0.4s; }
    .service-card:hover::before { height: 100%; }
    .service-card:hover { transform: translateY(-6px); box-shadow: 0 16px 48px rgba(0,0,0,0.12); }
    .service-icon { width: 60px; height: 60px; background: var(--bg); border: 2px solid var(--border); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-bottom: 24px; font-size: 26px; transition: all 0.3s; }
    .service-card:hover .service-icon { background: var(--gold); border-color: var(--gold); }
    .service-title { font-family: 'Playfair Display', serif; font-size: 20px; font-weight: 700; color: var(--dark); margin-bottom: 12px; }
    .service-desc { color: var(--light); line-height: 1.8; font-size: 15px; }

    /* PROPERTIES */
    #properties { background: white; }
    .properties-header { text-align: center; margin-bottom: 48px; }
    .properties-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; }
    .property-card { border: 1px solid var(--border); border-radius: 4px; overflow: hidden; transition: all 0.3s; background: white; }
    .property-card:hover { transform: translateY(-4px); box-shadow: 0 12px 40px rgba(0,0,0,0.1); }
    .property-img { height: 200px; overflow: hidden; position: relative; }
    .property-img img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.4s; }
    .property-card:hover .property-img img { transform: scale(1.05); }
    .property-badge { position: absolute; top: 12px; left: 12px; background: var(--gold); color: var(--dark); font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; padding: 5px 12px; border-radius: 2px; }
    .property-badge.sale { background: var(--dark); color: white; }
    .property-info { padding: 20px; }
    .property-price { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 700; color: var(--gold); margin-bottom: 6px; }
    .property-name { font-size: 16px; font-weight: 700; color: var(--dark); margin-bottom: 6px; }
    .property-location { font-size: 14px; color: var(--light); margin-bottom: 16px; }
    .property-features { display: flex; gap: 16px; font-size: 13px; color: var(--mid); padding-top: 16px; border-top: 1px solid var(--border); }
    .property-feature { display: flex; align-items: center; gap: 4px; }

    /* WHY CHOOSE US */
    #why { background: var(--dark); padding: 80px 0; position: relative; overflow: hidden; }
    #why::before { content: ''; position: absolute; top: -100px; right: -100px; width: 400px; height: 400px; background: radial-gradient(circle, rgba(201,168,76,0.12), transparent 70%); border-radius: 50%; }
    .why-grid { display: flex; gap: 64px; align-items: center; position: relative; z-index: 1; }
    .why-content { flex: 1; }
    .why-title { font-family: 'Playfair Display', serif; font-size: 40px; font-weight: 700; color: white; margin-bottom: 16px; line-height: 1.2; }
    .why-desc { color: #8080a0; line-height: 1.9; margin-bottom: 32px; font-size: 16px; }
    .why-list { display: flex; flex-direction: column; gap: 20px; }
    .why-item { display: flex; gap: 16px; align-items: flex-start; }
    .why-icon { width: 48px; height: 48px; background: rgba(201,168,76,0.15); border: 1px solid rgba(201,168,76,0.3); border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; }
    .why-item-title { font-weight: 700; color: white; font-size: 16px; margin-bottom: 4px; }
    .why-item-desc { color: #8080a0; font-size: 14px; line-height: 1.6; }
    .why-img { flex: 0 0 420px; height: 460px; border-radius: 4px; overflow: hidden; }
    .why-img img { width: 100%; height: 100%; object-fit: cover; }

    /* TESTIMONIAL */
    #testimonials { background: var(--bg); padding: 80px 0; }
    .testimonials-header { text-align: center; margin-bottom: 48px; }
    .testimonials-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; }
    .testimonial-card { background: white; border: 1px solid var(--border); padding: 28px; border-radius: 4px; transition: all 0.3s; }
    .testimonial-card:hover { box-shadow: 0 8px 32px rgba(0,0,0,0.08); border-color: var(--gold); }
    .testimonial-stars { color: var(--gold); font-size: 16px; margin-bottom: 16px; }
    .testimonial-text { color: var(--mid); line-height: 1.8; font-size: 15px; font-style: italic; margin-bottom: 20px; }
    .testimonial-author { display: flex; align-items: center; gap: 12px; }
    .testimonial-avatar { width: 44px; height: 44px; border-radius: 50%; background: var(--gold); display: flex; align-items: center; justify-content: center; font-family: 'Playfair Display', serif; font-weight: 700; color: var(--dark); font-size: 18px; flex-shrink: 0; }
    .testimonial-name { font-weight: 700; color: var(--dark); font-size: 15px; }
    .testimonial-role { font-size: 13px; color: var(--light); }

    /* CONTACT */
    #contact { background: white; }
    .contact-header { text-align: center; margin-bottom: 56px; }
    .contact-grid { display: flex; gap: 48px; max-width: 1000px; margin: 0 auto; }
    .contact-info { flex: 0 0 300px; display: flex; flex-direction: column; gap: 16px; }
    .contact-item { display: flex; gap: 16px; align-items: flex-start; padding: 20px; background: var(--bg); border: 1px solid var(--border); border-radius: 4px; transition: all 0.3s; }
    .contact-item:hover { border-color: var(--gold); box-shadow: 0 4px 16px rgba(0,0,0,0.06); }
    .contact-icon { width: 44px; height: 44px; background: white; border: 1px solid var(--border); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: var(--gold); flex-shrink: 0; font-size: 18px; }
    .contact-item-title { font-weight: 700; color: var(--dark); font-size: 15px; margin-bottom: 4px; }
    .contact-item-val { color: var(--light); font-size: 14px; }
    .whatsapp-box { background: var(--green); border-radius: 4px; padding: 20px; text-align: center; cursor: pointer; transition: all 0.3s; text-decoration: none; display: block; }
    .whatsapp-box:hover { background: #1da851; transform: translateY(-2px); }
    .whatsapp-box-icon { font-size: 32px; margin-bottom: 8px; }
    .whatsapp-box-title { font-weight: 700; color: white; font-size: 16px; margin-bottom: 4px; }
    .whatsapp-box-sub { font-size: 13px; color: rgba(255,255,255,0.8); }
    .contact-form { flex: 1; background: var(--bg); border: 1px solid var(--border); border-radius: 4px; padding: 36px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; font-size: 13px; font-weight: 700; color: var(--mid); margin-bottom: 8px; }
    .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 14px 16px; border: 1px solid #d8d0c0; background: white; font-family: 'Source Sans 3', sans-serif; font-size: 15px; color: var(--dark); border-radius: 2px; outline: none; transition: border-color 0.3s; }
    .form-group input:focus, .form-group textarea:focus, .form-group select:focus { border-color: var(--gold); box-shadow: 0 0 0 3px rgba(201,168,76,0.15); }
    .form-group textarea { resize: vertical; }
    .success-msg { text-align: center; padding: 60px 20px; display: none; }

    /* FOOTER */
    footer { background: var(--dark); color: #8a8aaa; padding: 48px 24px 24px; }
    .footer-grid { max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 48px; margin-bottom: 40px; }
    .footer-logo { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
    .footer-logo img { height: 40px; width: auto; }
    .footer-logo-text { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 900; color: white; }
    .footer-logo-text span { color: var(--gold); }
    .footer-desc { color: #6a6a8a; font-size: 14px; line-height: 1.8; margin-bottom: 20px; }
    .footer-social { display: flex; gap: 10px; }
    .footer-social-btn { width: 38px; height: 38px; background: #2a2a4e; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #8a8aaa; font-size: 13px; font-weight: 700; text-decoration: none; transition: all 0.3s; }
    .footer-social-btn:hover { background: var(--gold); color: var(--dark); }
    .footer-col-title { font-weight: 700; color: white; font-size: 15px; margin-bottom: 20px; letter-spacing: 1px; }
    .footer-links { display: flex; flex-direction: column; gap: 10px; }
    .footer-link { color: #6a6a8a; text-decoration: none; font-size: 14px; transition: color 0.3s; }
    .footer-link:hover { color: var(--gold); }
    .footer-bottom { max-width: 1200px; margin: 0 auto; padding-top: 24px; border-top: 1px solid #2a2a4e; display: flex; justify-content: space-between; align-items: center; font-size: 13px; }

    /* WHATSAPP FLOAT */
    .whatsapp-float { position: fixed; bottom: 90px; right: 28px; width: 56px; height: 56px; background: var(--green); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 26px; box-shadow: 0 4px 20px rgba(37,211,102,0.4); z-index: 999; text-decoration: non
